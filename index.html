<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="客戶名單">
<title>客戶名單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f3f1ea;--card:#fffdf8;--ink:#2c2a26;--muted:#8a857c;--line:#e4dfd4;
--shu:#2f7d5b;--shu-bg:#e3f1ea;--bushu:#c2772b;--bushu-bg:#f6e9d7;--bz:#5b6b8a;--bz-bg:#e6eaf1;--none:#b6b0a4;--none-bg:#efece4;
--call:#3a6ea5;--tlb:#9a5b9c;--done:#2f7d5b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif;padding:0 0 80px;}

/* ===== LIST PAGE ===== */
#listPage{padding:18px 14px;}
.wrap{max-width:580px;margin:0 auto;}
h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;margin:0 0 2px;}
.sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
.regionbar{display:flex;gap:8px;margin-bottom:12px;}
.regionbar select{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:99px;padding:6px 12px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:500;}
.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.plist{display:flex;flex-direction:column;gap:6px;}
.prow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;user-select:none;transition:transform .06s;}
.prow:active{transform:scale(.98);}
.pname{flex:1;font-size:16px;font-weight:500;}
.prg{font-size:12px;color:var(--muted);}
.pbadges{display:flex;gap:6px;align-items:center;}
.pbadge{font-size:11px;font-weight:700;border-radius:99px;padding:3px 9px;}
.pb-shu{background:var(--shu-bg);color:var(--shu);}
.pb-bushu{background:var(--bushu-bg);color:var(--bushu);}
.pb-bz{background:var(--bz-bg);color:var(--bz);}
.pb-none{background:var(--none-bg);color:var(--none);}
.pb-know{background:#e8f4e8;color:#3a7d3a;}
.pb-unknow{background:#f4e8e8;color:#7d3a3a;}
.pb-tl{background:var(--bz-bg);color:var(--tlb);}
.arrow{color:var(--muted);font-size:18px;}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}
.addbar{display:flex;gap:8px;margin:14px 0 6px;}
.addbar input{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.addbar button{border:none;background:var(--ink);color:#fff;border-radius:10px;padding:0 16px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;}
.io{display:flex;gap:8px;margin:8px 0 4px;}
.io button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:10px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;}
.tools{display:flex;justify-content:space-between;margin-top:12px;}
.reset{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;}
.saved{font-size:11px;color:var(--done);}

/* ===== DETAIL PAGE ===== */
#detailPage{display:none;padding:0;}
.dheader{display:flex;align-items:center;gap:10px;padding:16px 14px 12px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.dback{border:none;background:none;font-size:22px;cursor:pointer;padding:0 4px;color:var(--ink);}
.dname{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;flex:1;}
.drg{font-size:12px;color:var(--muted);}
.dbody{padding:16px 14px;max-width:580px;margin:0 auto;}
.dsec{margin-bottom:20px;}
.dsec-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.drow{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.drow label{font-size:14px;min-width:80px;color:var(--ink);}
.drow select{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.step{display:flex;align-items:center;border-radius:99px;overflow:hidden;border:1px solid var(--line);flex:1;}
.step .lab{font-size:12px;font-weight:700;padding:0 10px;flex-shrink:0;}
.step.call .lab{color:var(--call);}.step.tl .lab{color:var(--tlb);}
.step button{width:36px;height:38px;border:none;background:var(--card);color:var(--muted);font-size:20px;font-family:inherit;cursor:pointer;}
.step button:active{background:#eee;}
.step .val{flex:1;text-align:center;font-size:16px;font-weight:700;font-family:"Noto Serif TC",serif;}
.step.call .val{color:var(--call);}.step.tl .val{color:var(--tlb);}.step.full .val{color:var(--done);}
.note-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.note-input-wrap textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);resize:none;min-height:70px;}
.note-input-wrap button{border:none;background:var(--ink);color:#fff;border-radius:10px;padding:0 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;}
.notes-list{display:flex;flex-direction:column;gap:8px;}
.note-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;}
.note-date{font-size:11px;color:var(--muted);margin-bottom:4px;}
.note-text{font-size:14px;line-height:1.6;}
.note-del{float:right;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline;}
.no-notes{color:var(--muted);font-size:14px;text-align:center;padding:16px 0;}
</style></head><body>

<!-- LIST PAGE -->
<div id="listPage">
<div class="wrap">
<h1>客戶名單</h1>
<p class="sub">點名字進入詳細頁面</p>
<div class="regionbar"><select id="region"></select></div>
<div class="filters" id="filters">
<button class="fbtn active" data-f="all">全部</button>
<button class="fbtn" data-f="shu">熟</button>
<button class="fbtn" data-f="pu">普通</button>
<button class="fbtn" data-f="bushu">不熟</button>
<button class="fbtn" data-f="know">知道保險</button>
<button class="fbtn" data-f="unknow">不知道保險</button>
<button class="fbtn" data-f="idle">未動</button>
<button class="fbtn" data-f="calling">聯絡中</button>
<button class="fbtn" data-f="done">天龍完成</button>
</div>
<div class="plist" id="plist"></div>
<div class="addbar"><input id="addInput" type="text" placeholder="新增名字（加到目前選的地區）"><button id="addBtn">加入</button></div>
<div class="io"><button id="copyBtn">備份進度</button><button id="pasteBtn">還原進度</button></div>
<div class="tools"><span class="saved" id="saved"></span><button class="reset" id="resetBtn">重置全部名單</button></div>
</div>
</div>

<!-- DETAIL PAGE -->
<div id="detailPage">
<div class="dheader">
<button class="dback" id="backBtn">‹</button>
<div>
<div class="dname" id="dname"></div>
<div class="drg" id="drg"></div>
</div>
</div>
<div class="dbody">
<div class="dsec">
<div class="dsec-title">分類</div>
<div class="drow"><label>熟不熟</label>
<select id="dShu"><option value="0">未分類</option><option value="1">熟</option><option value="2">普通</option><option value="3">不熟</option></select></div>
<div class="drow"><label>知道保險</label>
<select id="dKnow"><option value="0">未設定</option><option value="1">知道</option><option value="2">不知道</option></select></div>
</div>
<div class="dsec">
<div class="dsec-title">進度</div>
<div class="drow">
<div class="step call"><span class="lab">聯絡</span><button data-act="c-">−</button><span class="val" id="dCval">0</span><button data-act="c+">＋</button></div>
<div class="step tl" id="dTLstep"><span class="lab">天龍</span><button data-act="t-">−</button><span class="val" id="dTval">0</span><button data-act="t+">＋</button></div>
</div>
</div>
<div class="dsec">
<div class="dsec-title">聯絡紀錄</div>
<div class="note-input-wrap">
<textarea id="noteInput" placeholder="輸入這次聯絡的狀況..."></textarea>
<button id="noteAddBtn">記錄</button>
</div>
<div class="notes-list" id="notesList"></div>
</div>
</div>
</div>

const REGIONS=["台南", "高雄", "嘉義", "台中", "台北", "新竹", "屏東", "桃園", "雲林", "花蓮", "台東", "未知"];
let roster=[],vFilter='all',regionFilter='全部',currentId=null;

function seed(){return SEED.map((d,i)=>({id:'p'+i,name:d.n,region:d.r,shu:0,know:0,c:0,t:0,notes:[]}));}

function load(){
  try{const raw=localStorage.getItem(KEY);roster=raw?JSON.parse(raw):seed();}
  catch(e){roster=seed();}
  if(!Array.isArray(roster)||roster.length===0)roster=seed();
  // ensure notes field exists
  roster.forEach(p=>{if(!p.notes)p.notes=[];});
  initRegion();renderList();
}

function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(roster));
    const s=document.getElementById('saved');
    s.textContent='已存';
    setTimeout(()=>{s.textContent='';},1200);
  }catch(e){alert('存檔失敗，請用備份進度功能。');}
}

function initRegion(){
  const sel=document.getElementById('region');
  const prev=regionFilter;
  sel.innerHTML='';
  const all=document.createElement('option');
  all.value='全部';all.textContent='全部地區 ('+roster.length+')';
  sel.appendChild(all);
  REGIONS.forEach(rg=>{
    const n=roster.filter(p=>p.region===rg).length;
    const o=document.createElement('option');
    o.value=rg;o.textContent=rg+' ('+n+')';
    sel.appendChild(o);
  });
  sel.value=prev;
  regionFilter=sel.value||'全部';
  sel.onchange=()=>{regionFilter=sel.value;renderList();};
}

function scope(){return roster.filter(p=>regionFilter==='全部'||p.region===regionFilter);}

function match(p){
  switch(vFilter){
    case'shu':return p.shu===1;case'pu':return p.shu===2;case'bushu':return p.shu===3;
    case'know':return p.know===1;case'unknow':return p.know===2;
    case'idle':return p.c===0&&p.t===0;case'calling':return p.c>0;case'done':return p.t>=MAXT;
    default:return true;
  }
}

function shuBadge(p){
  if(p.shu===0)return '<span class="pbadge pb-none">未分類</span>';
  if(p.shu===1)return '<span class="pbadge pb-shu">熟</span>';
  if(p.shu===2)return '<span class="pbadge pb-bushu">普通</span>';
  return '<span class="pbadge pb-bz">不熟</span>';
}
function knowBadge(p){
  if(p.know===1)return '<span class="pbadge pb-know">知道保險</span>';
  if(p.know===2)return '<span class="pbadge pb-unknow">不知道</span>';
  return '';
}
function tlBadge(p){
  if(p.t>=MAXT)return '<span class="pbadge pb-tl">天龍完成</span>';
  if(p.t>0)return '<span class="pbadge pb-tl">天龍'+p.t+'/8</span>';
  return '';
}

function renderList(){
  const list=document.getElementById('plist');list.innerHTML='';
  const items=scope().filter(match);
  if(items.length===0){list.innerHTML='<div class="empty">這個分類目前沒有人</div>';return;}
  items.forEach(p=>{
    const row=document.createElement('div');row.className='prow';
    const rg=regionFilter==='全部'?'<span class="prg">'+p.region+'</span>':'';
    row.innerHTML=
      '<span class="pname"></span>'+rg+
      '<div class="pbadges">'+shuBadge(p)+knowBadge(p)+tlBadge(p)+'</div>'+
      '<span class="arrow">›</span>';
    row.querySelector('.pname').textContent=p.name;
    row.onclick=()=>openDetail(p.id);
    list.appendChild(row);
  });
}

function openDetail(id){
  currentId=id;
  const p=roster.find(x=>x.id===id);if(!p)return;
  document.getElementById('dname').textContent=p.name;
  document.getElementById('drg').textContent=p.region;
  document.getElementById('dShu').value=p.shu;
  document.getElementById('dKnow').value=p.know;
  document.getElementById('dCval').textContent=p.c;
  document.getElementById('dTval').textContent=p.t;
  document.getElementById('dTLstep').className='step tl'+(p.t>=MAXT?' full':'');
  renderNotes(p);
  document.getElementById('listPage').style.display='none';
  document.getElementById('detailPage').style.display='block';
  window.scrollTo(0,0);
}

function closeDetail(){
  document.getElementById('detailPage').style.display='none';
  document.getElementById('listPage').style.display='block';
  renderList();
}

document.getElementById('backBtn').onclick=closeDetail;

document.getElementById('dShu').onchange=()=>{
  const p=roster.find(x=>x.id===currentId);if(!p)return;
  p.shu=parseInt(document.getElementById('dShu').value);save();
};
document.getElementById('dKnow').onchange=()=>{
  const p=roster.find(x=>x.id===currentId);if(!p)return;
  p.know=parseInt(document.getElementById('dKnow').value);save();
};

document.querySelectorAll('[data-act]').forEach(btn=>{
  btn.onclick=()=>{
    const p=roster.find(x=>x.id===currentId);if(!p)return;
    const a=btn.dataset.act;
    if(a==='c+')p.c=Math.min(MAXC,p.c+1);
    if(a==='c-')p.c=Math.max(0,p.c-1);
    if(a==='t+')p.t=Math.min(MAXT,p.t+1);
    if(a==='t-')p.t=Math.max(0,p.t-1);
    document.getElementById('dCval').textContent=p.c;
    document.getElementById('dTval').textContent=p.t;
    document.getElementById('dTLstep').className='step tl'+(p.t>=MAXT?' full':'');
    save();
  };
});

function today(){
  const d=new Date();
  return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
}

function renderNotes(p){
  const list=document.getElementById('notesList');list.innerHTML='';
  if(!p.notes||p.notes.length===0){list.innerHTML='<div class="no-notes">還沒有聯絡紀錄</div>';return;}
  [...p.notes].reverse().forEach((n,ri)=>{
    const i=p.notes.length-1-ri;
    const item=document.createElement('div');item.className='note-item';
    item.innerHTML='<button class="note-del" data-i="'+i+'">刪除</button><div class="note-date">'+n.date+'</div><div class="note-text"></div>';
    item.querySelector('.note-text').textContent=n.text;
    item.querySelector('.note-del').onclick=()=>{
      const p2=roster.find(x=>x.id===currentId);if(!p2)return;
      p2.notes.splice(i,1);save();renderNotes(p2);
    };
    list.appendChild(item);
  });
}

document.getElementById('noteAddBtn').onclick=()=>{
  const inp=document.getElementById('noteInput');
  const v=inp.value.trim();if(!v)return;
  const p=roster.find(x=>x.id===currentId);if(!p)return;
  if(!p.notes)p.notes=[];
  p.notes.push({date:today(),text:v});
  inp.value='';save();renderNotes(p);
};

document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('fbtn'))return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');vFilter=e.target.dataset.f;renderList();
});

function addName(){
  const inp=document.getElementById('addInput');const v=inp.value.trim();
  if(!v)return;
  const rg=regionFilter==='全部'?'未知':regionFilter;
  roster.unshift({id:'p_'+Date.now(),name:v,region:rg,shu:0,know:0,c:0,t:0,notes:[]});
  inp.value='';initRegion();save();renderList();
}
document.getElementById('addBtn').onclick=addName;
document.getElementById('addInput').addEventListener('keydown',e=>{if(e.key==='Enter')addName();});

function exportText(){
  let out=['名字,地區,熟不熟,知道保險,聯絡,天龍,紀錄'];
  roster.forEach(p=>{
    const notes=p.notes&&p.notes.length?JSON.stringify(p.notes):'[]';
    out.push(p.name+'|'+p.region+'|'+p.shu+'|'+p.know+'|'+p.c+'|'+p.t+'|'+notes);
  });
  return out.join('\n');
}
document.getElementById('copyBtn').onclick=async()=>{
  const t=exportText();
  try{await navigator.clipboard.writeText(t);alert('已複製！貼到 LINE 記事本保存。');}
  catch(e){window.prompt('複製下面文字保存：',t);}
};
document.getElementById('pasteBtn').onclick=()=>{
  const t=window.prompt('貼上備份文字還原：','');if(!t)return;
  const next=[];
  t.split('\n').forEach(line=>{
    const s=line.trim();if(!s||s.startsWith('名字,'))return;
    const p=s.split('|');if(p.length<6)return;
    let notes=[];try{notes=JSON.parse(p[6]||'[]');}catch(e){}
    next.push({id:'p_'+Math.random().toString(36).slice(2),
      name:p[0].trim(),region:(p[1]||'未知').trim(),
      shu:Math.max(0,Math.min(3,parseInt(p[2])||0)),
      know:Math.max(0,Math.min(2,parseInt(p[3])||0)),
      c:Math.max(0,Math.min(MAXC,parseInt(p[4])||0)),
      t:Math.max(0,Math.min(MAXT,parseInt(p[5])||0)),
      notes:Array.isArray(notes)?notes:[]});
  });
  if(next.length){roster=next;save();regionFilter='全部';vFilter='all';
    initRegion();document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.fbtn[data-f="all"]').classList.add('active');renderList();
    alert('還原完成，共 '+next.length+' 人。');}
  else alert('沒讀到名單。');
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('確定要重置成原本全部名單嗎？所有標記與紀錄會清掉。')){
    roster=seed();save();regionFilter='全部';vFilter='all';
    initRegion();document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.fbtn[data-f="all"]').classList.add('active');renderList();}
};
load();
</script></body></html>
