<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#f3f1ea;--card:#fffdf8;--ink:#2c2a26;--muted:#8a857c;--line:#e4dfd4;

--call:#3a6ea5;--tlb:#9a5b9c;--done:#2f7d5b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif;padding:18px 14px 80px;}
.wrap{max-width:580px;margin:0 auto;}
h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;margin:0 0 2px;}
.sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
.saved{font-size:11px;color:var(--done);opacity:0;transition:opacity .3s;margin-left:6px;}
.saved.show{opacity:1;}
.regionbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.regionbar select{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.counts{display:flex;gap:7px;margin-bottom:12px;}
.count{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 4px;text-align:center;}
.count .n{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:700;line-height:1;}
.count .l{font-size:10.5px;color:var(--muted);margin-top:3px;}
.c-shu .n{color:var(--shu);}.c-bushu .n{color:var(--bushu);}.c-bz .n{color:var(--bz);}.c-done .n{color:var(--done);}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:99px;padding:6px 12px;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:500;}
.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.list{display:flex;flex-direction:column;gap:8px;}
.row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;display:flex;flex-direction:column;gap:9px;}
.top{display:flex;align-items:center;gap:9px;}
.name{flex:1;font-size:16px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rg{font-size:11px;color:var(--muted);flex-shrink:0;}
.tag{font-size:13px;font-weight:700;border-radius:99px;padding:5px 13px;min-width:64px;text-align:center;cursor:pointer;user-select:none;flex-shrink:0;}
.tag.t0{background:var(--none-bg);color:var(--none);}.tag.t1{background:var(--shu-bg);color:var(--shu);}.tag.t2{background:var(--bushu-bg);color:var(--bushu);}.tag.t3{background:var(--bz-bg);color:var(--bz);}
.bottom{display:flex;gap:8px;}
.step{display:flex;align-items:center;border-radius:99px;overflow:hidden;border:1px solid var(--line);flex:1;}
.step .lab{font-size:11.5px;font-weight:700;padding:0 9px;flex-shrink:0;}
.step.call .lab{color:var(--call);}.step.tl .lab{color:var(--tlb);}
.step button{width:34px;height:36px;border:none;background:var(--card);color:var(--muted);font-size:20px;font-family:inherit;cursor:pointer;line-height:1;flex-shrink:0;}
.step button:active{background:#eee;}
.step .val{flex:1;text-align:center;font-size:15px;font-weight:700;font-family:"Noto Serif TC",serif;}
.step.call .val{color:var(--call);}.step.tl .val{color:var(--tlb);}.step.full .val{color:var(--done);}
.addbar{display:flex;gap:8px;margin:16px 0 6px;}
.addbar input{flex:1;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.addbar button{border:none;background:var(--ink);color:#fff;border-radius:10px;padding:0 18px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;}
.io{display:flex;gap:8px;margin:10px 0 4px;}
.io button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:11px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;}
.tools{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.hint{font-size:12px;color:var(--muted);line-height:1.5;}
.reset{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;}
.empty{text-align:center;color:var(--muted);padding:30px 0;font-size:14px;}

<button class="fbtn" data-f="done">天龍完成</button></div>

const REGIONS=["台南", "高雄", "嘉義", "台中", "台北", "新竹", "屏東", "桃園", "雲林", "花蓮", "台東", "未知"];
let roster=[],vFilter='all',regionFilter='全部';

function seed(){return SEED.map((d,i)=>({id:'p'+i,name:d.n,region:d.r,tag:0,c:0,t:0}));}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    roster=raw?JSON.parse(raw):seed();
  }catch(e){roster=seed();}
  if(!Array.isArray(roster)||roster.length===0)roster=seed();
  initRegion();render();
}

let st;
function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(roster));
    const s=document.getElementById('saved');
    s.classList.add('show');
    clearTimeout(st);st=setTimeout(()=>s.classList.remove('show'),900);
  }catch(e){alert('存檔失敗，請用備份進度功能手動儲存。');}
}

function initRegion(){
  const sel=document.getElementById('region');
  const prev=sel.value||regionFilter;
  sel.innerHTML='';
  const all=document.createElement('option');
  all.value='全部';all.textContent='全部地區 ('+roster.length+')';
  sel.appendChild(all);
  REGIONS.forEach(rg=>{
    const n=roster.filter(p=>p.region===rg).length;
    const o=document.createElement('option');
    o.value=rg;o.textContent=rg+' ('+n+')';
    sel.appendChild(o);
  });
  sel.value=prev;
  regionFilter=sel.value||'全部';
  sel.onchange=()=>{regionFilter=sel.value;render();};
}

function scope(){return roster.filter(p=>regionFilter==='全部'||p.region===regionFilter);}

function counts(){
  let s1=0,s2=0,s3=0,done=0;
  scope().forEach(p=>{
    if(p.tag===1)s1++;if(p.tag===2)s2++;if(p.tag===3)s3++;
    if(p.t>=MAXT)done++;
  });
  document.getElementById('n1').textContent=s1;
  document.getElementById('n2').textContent=s2;
  document.getElementById('n3').textContent=s3;
  document.getElementById('nDone').textContent=done;
}

function match(p){
  switch(vFilter){
    case'tag0':return p.tag===0;case'tag1':return p.tag===1;
    case'tag2':return p.tag===2;case'tag3':return p.tag===3;
    case'idle':return p.c===0&&p.t===0;
    case'calling':return p.c>0;
    case'tl':return p.t>0&&p.t<MAXT;
    case'done':return p.t>=MAXT;
    default:return true;
  }
}

function render(){
  counts();
  const list=document.getElementById('list');list.innerHTML='';
  const items=scope().filter(match);
  if(items.length===0){list.innerHTML='<div class="empty">這個分類目前沒有人</div>';return;}
  items.forEach(p=>{
    const row=document.createElement('div');row.className='row';
    const full=p.t>=MAXT?' full':'';
    const rg=regionFilter==='全部'?'<span class="rg">'+p.region+'</span>':'';
    row.innerHTML=
      '<div class="top"><span class="name"></span>'+rg+
      '<span class="tag t'+p.tag+'" data-act="tag">'+TAGS[p.tag]+'</span></div>'+
      '<div class="bottom">'+
      '<div class="step call"><span class="lab">聯</span><button data-act="c-">−</button><span class="val">'+p.c+'</span><button data-act="c+">＋</button></div>'+
      '<div class="step tl'+full+'"><span class="lab">龍</span><button data-act="t-">−</button><span class="val">'+p.t+'</span><button data-act="t+">＋</button></div>'+
      '</div>';
    row.querySelector('.name').textContent=p.name;
    row.querySelectorAll('[data-act]').forEach(el=>{
      el.onclick=()=>{
        const a=el.dataset.act;
        if(a==='tag')p.tag=(p.tag+1)%4;
        if(a==='c+')p.c=Math.min(MAXC,p.c+1);
        if(a==='c-')p.c=Math.max(0,p.c-1);
        if(a==='t+')p.t=Math.min(MAXT,p.t+1);
        if(a==='t-')p.t=Math.max(0,p.t-1);
        save();render();
      };
    });
    list.appendChild(row);
  });
}

document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('fbtn'))return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');vFilter=e.target.dataset.f;render();
});

function addName(){
  const inp=document.getElementById('addInput');const v=inp.value.trim();
  if(!v)return;
  const rg=regionFilter==='全部'?'未知':regionFilter;
  roster.unshift({id:'p_'+Date.now(),name:v,region:rg,tag:0,c:0,t:0});
  inp.value='';initRegion();save();render();
}
document.getElementById('addBtn').onclick=addName;
document.getElementById('addInput').addEventListener('keydown',e=>{if(e.key==='Enter')addName();});

function exportText(){
  let out=['名字,地區,標籤,聯絡,天龍'];
  roster.forEach(p=>out.push(p.name+','+p.region+','+p.tag+','+p.c+','+p.t));
  return out.join('\n');
}
document.getElementById('copyBtn').onclick=async()=>{
  const t=exportText();
  try{await navigator.clipboard.writeText(t);alert('已複製！貼到 LINE 記事本保存，換裝置時用「還原進度」貼回來。');}
  catch(e){window.prompt('複製下面文字保存：',t);}
};
document.getElementById('pasteBtn').onclick=()=>{
  const t=window.prompt('貼上備份的文字還原：','');
  if(!t)return;
  const next=[];
  t.split('\n').forEach(line=>{
    const s=line.trim();if(!s||s.startsWith('名字,'))return;
    const p=s.split(',');if(p.length<5)return;
    next.push({id:'p_'+Math.random().toString(36).slice(2),
      name:p[0].trim(),region:(p[1]||'未知').trim(),
      tag:Math.max(0,Math.min(3,parseInt(p[2])||0)),
      c:Math.max(0,Math.min(MAXC,parseInt(p[3])||0)),
      t:Math.max(0,Math.min(MAXT,parseInt(p[4])||0))});
  });
  if(next.length){
    roster=next;save();regionFilter='全部';vFilter='all';
    initRegion();
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.fbtn[data-f="all"]').classList.add('active');
    render();alert('還原完成，共 '+next.length+' 人。');
  }else alert('沒讀到名單，請確認貼的是備份的內容。');
};

document.getElementById('resetBtn').onclick=()=>{
  if(confirm('確定要重置成原本全部名單嗎？目前標記與進度會清掉。')){
    roster=seed();save();regionFilter='全部';vFilter='all';
    initRegion();
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.fbtn[data-f="all"]').classList.add('active');
    render();
  }
};
